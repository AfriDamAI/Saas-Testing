<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Partner Test - AfriDam AI</title>
    <style>
        /* Modern, clean styling like Haut.AI */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; }
        
        .brand-logo { font-weight: bold; color: #8b4513; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .scan-button { background: #000; color: #fff; border: none; padding: 15px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: transform 0.2s; width: 100%; margin-top: 20px; }
        
        .scan-button:active { transform: scale(0.98); }

        /* The Modal Popup where Tobi's SaaS will live */
        #afridam-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        
        #afridam-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; height: 90%; background: #fff; border-radius: 20px; overflow: hidden; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; font-weight: bold; color: #333; cursor: pointer; z-index: 1001; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="brand-logo">Partner Brand Name</div>
        <img src="https://via.placeholder.com/150" alt="Skincare Product" style="width: 100%; border-radius: 10px;">
        <h3>Radiance Glow Serum</h3>
        <p style="color: #666; font-size: 14px;">Not sure if this matches your skin type?</p>
        
        <button class="scan-button" onclick="openScanner()">✨ Scan with AfriDam AI</button>
    </div>

    <div id="afridam-modal">
        <div id="afridam-container">
            <span class="close-btn" onclick="closeScanner()">&times;</span>
            <iframe id="scanner-frame" src="REPLACE_WITH_TOBI_URL_HERE"></iframe>
        </div>
    </div>

    <script>
        function openScanner() {
            document.getElementById('afridam-modal').style.display = 'block';
            // Logic to prevent background scrolling
            document.body.style.overflow = 'hidden';
        }

        function closeScanner() {
            document.getElementById('afridam-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
