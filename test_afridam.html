<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Partner Test - AfriDam AI</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .product-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 380px; border: 1px solid #eee; }
        .brand-logo { font-weight: 800; color: #5d4037; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 14px; }
        .product-img { width: 100%; border-radius: 12px; margin-bottom: 15px; background: #fafafa; }
        h3 { margin: 10px 0; color: #333; }
        p { color: #777; font-size: 14px; line-height: 1.5; }
        .scan-button { background: #1a1a1a; color: #fff; border: none; padding: 16px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-top: 25px; font-size: 15px; }
        .scan-button:hover { background: #333; transform: translateY(-2px); }
        #afridam-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        #afridam-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; height: 85%; background: #fff; border-radius: 25px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; font-weight: bold; color: #999; cursor: pointer; z-index: 1001; transition: 0.2s; }
        .close-btn:hover { color: #333; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="brand-logo">Partner Brand Demo</div>
        <img src="https://via.placeholder.com/200x200?text=Skincare+Product" class="product-img" alt="Skincare Product">
        <h3>Radiance Glow Serum</h3>
        <p>Advanced melanin-rich formula. Use our AI to see if this fits your current skin profile.</p>
        
        <button class="scan-button" onclick="openScanner()">✨ Start AI Skin Scan</button>
    </div>

    <div id="afridam-modal">
        <div id="afridam-container">
            <span class="close-btn" onclick="closeScanner()">&times;</span>
            <iframe id="scanner-frame" src=""></iframe>
        </div>
    </div>

    <script>
        // Tobi's Backend Credentials
        const AFRIDAM_CONFIG = {
            apiUrl: "https://afridam-backend-api-131829695574.us-central1.run.app/api/",
            apiKey: "$2b$10$yZ2xw0Qbx7TigffYMOsCCO0OxHq3i4Zfv5L/WoK46u7GyXmrgO/ye",
            orgId: "org_live_931a2a645bf8bddb8e50273882e68008f878112b6556c83e"
        };

        function openScanner() {
            const modal = document.getElementById('afridam-modal');
            const iframe = document.getElementById('scanner-frame');
            
            // We append the Org ID and API Key as URL parameters so the backend recognizes this partner
            const requestUrl = `${AFRIDAM_CONFIG.apiUrl}scanner-ui?org_id=${AFRIDAM_CONFIG.orgId}&api_key=${AFRIDAM_CONFIG.apiKey}`;
            
            iframe.src = requestUrl;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeScanner() {
            document.getElementById('afridam-modal').style.display = 'none';
            document.getElementById('scanner-frame').src = ""; // Stop the camera/session when closed
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
